<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi princesa 💘</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Georgia', serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1a0f05;
    overflow:hidden;
}

/* Fondo tipo antiguo */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,200,120,0.05) 1px, transparent 1px);
    background-size:50px 50px;
    animation: moveBg 25s linear infinite;
}

@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

/* Pergamino */
.pergamino{
    width:80%;
    max-width:700px;
    padding:40px;
    background: linear-gradient(180deg, #f5deb3, #e6c79c);
    border-radius:10px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
    position:relative;
    animation: aparecer 2s ease;
}

/* Bordes quemados */
.pergamino::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:10px;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#5a2e0c;
}

p{
    font-size:18px;
    line-height:1.6;
    color:#3b1f08;
    white-space:pre-line;
}

/* Botón abrir */
.boton{
    position:absolute;
    bottom:-60px;
    left:50%;
    transform:translateX(-50%);
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#8b4513;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* Animaciones */
@keyframes aparecer{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="pergamino">
    <h1>Para ti, mi princesa 👑</h1>
    <p id="texto"></p>

    <div class="boton">
        <button onclick="iniciar()">Abrir carta 💌</button>
    </div>
</div>

<script>
const mensaje = `
Mi niña… mi mami… mi flakita hermosa…

No sé en qué momento dejaste de ser coincidencia
para convertirte en algo que siento mío…

Porque sí…
te pienso demasiado,
te siento más de lo normal,
y te quiero… de una forma que no se comparte.

Princesa…
me gusta cómo te vuelves parte de mí,
cómo sin darte cuenta te metes en mi cabeza,
en mi día… y hasta en mis noches.

Y no te voy a mentir…
no me gusta imaginarte lejos,
ni mucho menos imaginar que alguien más
pueda mirarte como yo lo hago.

Porque yo no te quiero a medias…

yo te quiero bien,
te quiero feliz…
pero también te quiero conmigo 😌

Mami…
tienes algo que no sé explicar,
pero sí sé que no lo quiero perder.

Así que ve acostumbrándote a esto…
a que te escriba,
a que te piense,
a que te quiera así…

porque cuando yo me quedo…
no es por un rato…

es porque decidí que eres mía 💘
`;

let i = 0;

function escribir(){
    if(i < mensaje.length){
        document.getElementById("texto").innerHTML += mensaje.charAt(i);
        i++;
        setTimeout(escribir, 30);
    }
}

function iniciar(){
    document.getElementById("texto").innerHTML = "";
    i = 0;
    escribir();
}
</script>

</body>
</html>
